<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ETM Checklist" />
  <title>Thrift at the Warehouse - Warehouse</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/app-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <section class="location-page">
      <a class="back-link" href="index.html">&larr; Back to Locations</a>

      <header class="loc-header">
        <p class="loc-eyebrow">Thrift at the Warehouse</p>
        <h1>Warehouse Location</h1>
      </header>

      <div class="info-grid">
        <div class="info-card placeholder">
          <span class="info-label">Address</span>
          <p class="info-value muted">Add address</p>
        </div>

        <div class="info-card placeholder">
          <span class="info-label">Est. Time to Complete</span>
          <p class="info-value muted">Add time</p>
        </div>

        <div class="info-card placeholder">
          <span class="info-label">Key</span>
          <p class="info-value muted">Add key info</p>
        </div>

        <div class="info-card placeholder">
          <span class="info-label">Alarm</span>
          <p class="info-value muted">Add alarm info</p>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
