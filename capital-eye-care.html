<!DOCTYPE html>
<html lang="en" style="background-color: #ffffff; color-scheme: only light;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="only light" />
  <meta name="supported-color-schemes" content="light" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ETM Checklist" />
  <title>Capital Eye Care — ETM Checklist</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/app-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Capital Eye Care: match other locations on iOS if this route had a stale CSS pair */
    html {
      background-color: #ffffff !important;
      color-scheme: only light !important;
      overscroll-behavior-y: none;
      position: relative;
      isolation: isolate;
    }
    body {
      background-color: #ffffff !important;
      overscroll-behavior-y: none;
      position: relative;
      isolation: isolate;
    }
    html::before,
    body::before {
      content: "";
      position: fixed;
      top: -100vh;
      left: 0;
      right: 0;
      width: 100%;
      height: 300vh;
      z-index: -1;
      background-color: #ffffff;
      pointer-events: none;
    }
    main {
      background-color: #ffffff !important;
      min-height: 100vh;
      min-height: 100dvh;
    }
    .location-page,
    .checklist-page,
    .log-page {
      background-color: #ffffff !important;
    }
  </style>
</head>
<body style="background-color: #ffffff;">
  <main>
    <section class="location-page">
      <a class="back-link" href="index.html">&larr; Back to Locations</a>

      <header class="loc-header">
        <p class="loc-eyebrow">ETM Checklist</p>
        <h1>Capital Eye Care</h1>
      </header>

      <div class="info-grid">
        <div class="info-card placeholder">
          <span class="info-label">Address</span>
          <p class="info-value muted">Add address</p>
        </div>

        <div class="info-card placeholder">
          <span class="info-label">Est. Time to Complete</span>
          <p class="info-value muted">Add time</p>
        </div>

        <div class="info-card placeholder">
          <span class="info-label">Key</span>
          <p class="info-value muted">Add key info</p>
        </div>

        <div class="info-card placeholder">
          <span class="info-label">Alarm</span>
          <p class="info-value muted">Add alarm info</p>
        </div>
      </div>

      <p class="block-notice" id="blockNotice" hidden>
        A cleaning is in progress at another location. Finish or reset that one before starting a new cleaning here.
      </p>

      <a class="start-btn" href="capital-eye-care-checklist.html"
         data-storage-key="checklist-capital-eye-care"
         id="startCleaningBtn">Start Cleaning</a>

      <a class="log-btn" href="capital-eye-care-log.html">View Cleaning Log</a>
    </section>
  </main>

  <script>
    (function () {
      var btn = document.getElementById('startCleaningBtn');
      var notice = document.getElementById('blockNotice');
      var key = btn.dataset.storageKey;

      function isSessionActive() {
        var startedAt = localStorage.getItem(key + ':startedAt');
        var accumulated = localStorage.getItem(key + ':accumulatedMs');
        var completed = localStorage.getItem(key + ':completedAt');
        return (startedAt || accumulated) && !completed;
      }

      function findActiveOtherLocation() {
        for (var i = 0; i < localStorage.length; i++) {
          var k = localStorage.key(i);
          if (!k) continue;
          var m = k.match(/^(checklist-[^:]+):(startedAt|accumulatedMs)$/);
          if (m && m[1] !== key) {
            var completed = localStorage.getItem(m[1] + ':completedAt');
            if (!completed) return m[1];
          }
        }
        return null;
      }

      function syncBtnState() {
        btn.classList.remove('in-progress', 'blocked');
        notice.hidden = true;
        if (isSessionActive()) {
          btn.classList.add('in-progress');
          btn.textContent = 'Continue Cleaning';
        } else if (findActiveOtherLocation()) {
          btn.classList.add('blocked');
          btn.setAttribute('aria-disabled', 'true');
          btn.textContent = 'Cleaning In Progress Elsewhere';
          notice.hidden = false;
        } else {
          btn.removeAttribute('aria-disabled');
          btn.textContent = 'Start Cleaning';
        }
      }

      btn.addEventListener('click', function (e) {
        if (btn.classList.contains('blocked')) {
          e.preventDefault();
          notice.classList.remove('shake');
          void notice.offsetWidth;
          notice.classList.add('shake');
          return;
        }
        var startedKey = key + ':startedAt';
        if (!localStorage.getItem(startedKey)) {
          localStorage.setItem(startedKey, Date.now().toString());
        }
      });

      syncBtnState();
    })();
  </script>
  <script src="app.js"></script>
</body>
</html>
