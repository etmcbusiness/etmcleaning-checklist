<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ETM Checklist" />
  <title>Ramsey Rd - Cleaning Log</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <section class="log-page" data-storage-key="checklist-ramsey-rd">
      <a class="back-link" href="ramsey-rd.html">&larr; Back to Location</a>

      <header class="loc-header">
        <p class="loc-eyebrow">Thrift at the Warehouse &mdash; Ramsey Rd</p>
        <h1>Cleaning Log</h1>
      </header>

      <div class="log-summary" id="logSummary"></div>

      <div class="log-table-wrap" id="logTableWrap" hidden>
        <table class="log-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Started</th>
              <th>Ended</th>
              <th>Duration</th>
            </tr>
          </thead>
          <tbody id="logBody"></tbody>
        </table>
      </div>

      <div class="log-empty" id="logEmpty" hidden>
        <p>No cleanings logged yet.</p>
        <p class="muted-text">Completed cleanings will appear here automatically once you click <strong>Mark Complete</strong> on the checklist.</p>
      </div>

      <div class="log-actions">
        <button type="button" class="btn-secondary" id="clearLogBtn">Clear Log</button>
      </div>
    </section>
  </main>

  <script src="log.js"></script>
  <script src="app.js"></script>
</body>
</html>
