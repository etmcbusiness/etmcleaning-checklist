<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4d6885" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ETM Checklist" />
  <title>ETM Checklist — Choose a location</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/app-icon.png" />
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg" />
  <link rel="apple-touch-icon" href="icons/app-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <section class="hero">
      <h1>ETM Checklist<br /><span class="accent">Choose a location</span></h1>
    </section>

    <section class="locations">
      <p class="active-cleaning-hint" id="activeCleaningHint" hidden>
        A cleaning is in progress &mdash; tap it to continue. Finish or reset before starting one at another location.
      </p>
      <div class="location-list">
        <a class="location-btn" href="ramsey-rd.html" data-storage-key="checklist-ramsey-rd">Thrift at the Warehouse: Ramsey Rd Location</a>
        <a class="location-btn" href="warehouse.html" data-storage-key="checklist-warehouse">Thrift at the Warehouse: Warehouse Location</a>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var buttons = document.querySelectorAll('.location-btn[data-storage-key]');
      var hasActive = false;

      buttons.forEach(function (btn) {
        var key = btn.dataset.storageKey;
        var startedAt = localStorage.getItem(key + ':startedAt');
        var accumulated = localStorage.getItem(key + ':accumulatedMs');
        var completed = localStorage.getItem(key + ':completedAt');
        if ((startedAt || accumulated) && !completed) {
          btn.classList.add('in-progress');
          hasActive = true;
        }
      });

      if (hasActive) {
        document.getElementById('activeCleaningHint').hidden = false;
      }
    })();
  </script>
  <script src="app.js"></script>
</body>
</html>
