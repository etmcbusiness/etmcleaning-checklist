<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ETM Checklist" />
  <title>Capital Eye Care — Cleaning log (ETM Checklist)</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/app-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <section class="log-page" data-storage-key="checklist-capital-eye-care">
      <a class="back-link" href="capital-eye-care.html">&larr; Back to Location</a>

      <header class="loc-header">
        <p class="loc-eyebrow">Capital Eye Care</p>
        <h1>Cleaning Log</h1>
      </header>

      <div class="log-summary" id="logSummary"></div>

      <div class="log-table-wrap" id="logTableWrap" hidden>
        <table class="log-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Started</th>
              <th>Ended</th>
              <th>Duration</th>
            </tr>
          </thead>
          <tbody id="logBody"></tbody>
        </table>
      </div>

      <div class="log-empty" id="logEmpty" hidden>
        <p>No cleanings logged yet.</p>
        <p class="muted-text">Completed cleanings will appear here automatically once you click <strong>Mark Complete</strong> on the checklist.</p>
      </div>

      <div class="log-actions">
        <button type="button" class="btn-secondary" id="exportLogBtn">Export log (JSON)</button>
        <button type="button" class="btn-secondary" id="clearLogBtn">Clear Log</button>
      </div>
    </section>

    <div class="modal-backdrop" id="confirmModal">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
        <h2 id="confirmTitle">Confirm</h2>
        <p id="confirmMessage"></p>
        <div class="modal-actions">
          <button type="button" class="modal-btn modal-no" id="confirmCancel">Cancel</button>
          <button type="button" class="modal-btn modal-yes modal-danger" id="confirmOk">Confirm</button>
        </div>
      </div>
    </div>

    <div class="modal-backdrop gallery-backdrop" id="galleryModal" aria-hidden="true">
      <div class="gallery-panel" role="dialog" aria-modal="true" aria-label="Cleaning photos and videos">
        <button type="button" class="gallery-close" id="galleryClose" aria-label="Close gallery">&times;</button>
        <div class="gallery-stage" id="galleryStage"></div>
        <div class="gallery-toolbar">
          <button type="button" class="gallery-nav-btn" id="galleryPrev" aria-label="Previous">&lsaquo;</button>
          <span class="gallery-counter" id="galleryCounter" aria-live="polite"></span>
          <button type="button" class="gallery-nav-btn" id="galleryNext" aria-label="Next">&rsaquo;</button>
        </div>
      </div>
    </div>
  </main>

  <script src="media-db.js"></script>
  <script src="log.js"></script>
  <script src="app.js"></script>
</body>
</html>
